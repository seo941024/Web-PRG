<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>document.write</title>
  </head>
  <body>
    <!-- Do it! document.write() 문으로 내용 표시하기 -->
    <h1>어서오세요</h1>
    <script>
      let name = prompt("이름을 입력하세요");
      //console.log(name + "님, 환영합니다!");
      document.write(name + "님, 환영합니다!");
    </script>
  </body>
</html>
