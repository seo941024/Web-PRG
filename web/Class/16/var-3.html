<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prompt</title>
  </head>
  <body>
    <script>
      // var과 let 차이점 확인: 코드 실행하여 결과 확인후, var 을 let으로 변경해 보기
      function add(a, b) {
        return a + b;
      }

      var sum = add(10, 20);
      console.log(sum);
      var sum = 30;
      console.log(sum);
      let f = parseFloat(prompt("변환할 화씨 온도 "));
      let c;

      c = ((f - 32) / 1.8).toFixed(1);
      alert(`화씨 ${f}도는 섭씨 ${c}도 입니다.`);
    </script>
  </body>
</html>
