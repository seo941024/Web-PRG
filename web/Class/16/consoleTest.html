    <script>
        //let num = parseInt(prompt('숫자입력>>'));
        let num = prompt('숫자입력>>');
        console.log(typeof(num));
        
        if (num % 3 == 0) {
            console.log(`${num}은 3의 배수`);
        }
        else {
            console.log( `${num}은 3의 배수가 아님`)
        }
        let one = '10';
        let two = 20;

        console.log(typeof(one + two))  //1020
    </script>
